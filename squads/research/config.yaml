# Research Squad v5.0.0 (renamed from spy 2026-05-16)
# Unified research operations: competitive intelligence + deep technical research +
# product discovery + benchmarking + marketing deep-dives.

name: research
version: "5.0.0"
description: "Unified research operations: deep technical research (absorbed from /tech-research 2026-05-16), competitive intelligence, evidence-based research, marketing deep-dives, product discovery (JTBD/Mom Test/Villain/WTP), universal benchmarking, PICO/OSINT pipeline, systematic reviews, decision science, bias detection. Absorbed deep-research (v1.0.0) in 2026-04-13; renamed spy→research and absorbed tech-research v2.0.0 in 2026-05-16."
author: "AIOX Team"
upgraded_at: "2026-05-16"

pack:
  name: research
  title: "Research Squad - Unified Intelligence & Discovery"
  version: "5.0.0"
  author: "AIOX Team"
  description: "Unified research squad covering deep technical research, competitive intelligence, marketing deep-dives, product discovery, and benchmarking."
  icon: "🔬"
  slash_prefix: "research"

metadata:
  # MIGRATION-SCHEMA-001 backfill
  status: active
  domain: research
  version: "5.0.0"
  score: 64.25
  absorbed:
    - squad: deep-research
      version: "1.0.0"
      date: "2026-04-13"
      reason: "Evidence-based research pipeline (11 agents, 17 tasks, 3 workflows) absorbed into spy (now research)"
    - skill: tech-research
      version: "2.0.0"
      date: "2026-05-16"
      reason: "Standalone /tech-research skill absorbed into squad as research-tech agent. 7 molecules, 17 atoms, full workflow pipeline + 14 scripts + templates. Source story: spy→research migration."
  renamed:
    - from: spy
      to: research
      date: "2026-05-16"
      reason: "Squad scope expanded beyond competitive intelligence to encompass full research operations. 'spy' branding too narrow."
  added:
    - feature: product-discovery
      version: "4.1.0"
      date: "2026-05-11"
      reason: "Wave 0 — 4 atoms + 1 molecule + 1 workflow + framework reference, ADAPT from Banco de Ideias Modelo (Fase 0). Source story: STORY-SPY-PD.1."

entry_agent: research-chief

domain_model:
  Strategic:
    label: "Estratégico"
    scope: "Posicionamento competitivo, inteligência de mercado e decisões de benchmark"
  Tactical:
    label: "Tático"
    scope: "Orquestração de benchmarks, síntese de evidências e análise comparativa"
  Operational:
    label: "Operacional"
    scope: "Coleta, transcrição, publicação e automação de artefatos"

logging:
  runtime_audit: true
  error_behavior: fail_loud
  error_handling:
    on_research_fail: emit_recovery_handoff
    on_benchmark_fail: preserve_partial_artifacts
    on_publish_fail: block_completion

# ═══════════════════════════════════════════════════════════════════════════════
# SQUAD TYPE & INTEGRATION
# ═══════════════════════════════════════════════════════════════════════════════
squad_type: pipeline
# pipeline = Sequential flow: Research → Analysis → Output

mmos_integration:
  enabled: false
  fallback_behavior: "graceful"

workspace_integration:
  level: none
  rationale: >-
    Research não escreve artefatos canônicos em workspace. Publicações são
    classificadas por tipo: deep-dives 1-player em docs/research/, comparativos
    multi-player e benchmarks A-vs-B em docs/bench/, auditorias de framework
    em docs/audits/. Dados efêmeros (raw API, transcripts, handoffs entre
    skills) permanecem em outputs/research/.
  read_paths: []
  write_paths: []
  readiness_owner: workspace-chief
  readiness_resolver: null

# ═══════════════════════════════════════════════════════════════════════════════
# AGENTS
# ═══════════════════════════════════════════════════════════════════════════════
agents:
  - id: research-operator
    name: "Research Operator"
    role: "Human approval and strategic input"
    tier: human
    specialty: "Approval, scoping, executive decision"
    executor_profile:
      sinkra_type: "Human"
      human_in_the_loop: true
      output_schema: research-brief

  - id: research-chief
    name: "Research Chief"
    role: "Main research orchestrator — dispatches to specialist modes (tech, marketing-deepdive, bench, competitive-intel)"
    tier: orchestrator
    specialty: "Research operations, competitive intelligence, mode dispatch"
    executor_profile:
      sinkra_type: "Agent"
      human_in_the_loop: true
      output_schema: benchmark-routing-decision
      story_role: "reviewer"
      can_execute: false
      can_review:
        - competitive-intelligence
        - market-analysis
      work_contexts:
        - player-analysis
        - viral-content
        - market-trends
        - youtube-research
        - instagram-research
      core_replaces: null

  - id: marketing-deepdive
    name: "Marketing Deep-Dive Specialist"
    role: "1-player marketing deep dive (audience, content, pricing, distribution, swipe files)"
    tier: 1
    specialty: "Deep research, data validation, strategic insights"
    executor_profile:
      sinkra_type: "Agent"
      human_in_the_loop: true
      output_schema: deep-research-report
      story_role: "executor"
      can_execute: true
      can_review:
        - research-quality
        - data-validation
      work_contexts:
        - deep-research
        - data-analysis
        - strategic-insights
        - competitive-benchmarking
        - content-analysis
      core_replaces: "@analyst"

  - id: tech-research-agent
    name: "Tech Research Agent"
    role: "Deep technical research pipeline (7 molecules, 11 atoms) with multi-wave search, coverage scoring, multi-LLM cross-reference, citation verification"
    tier: 1
    specialty: "Evidence-based research, COVERAGE_GATE compliance, CITATION_GATE verification, output-graded dossiers"
    executor_profile:
      sinkra_type: "Agent"
      human_in_the_loop: true
      output_schema: research-output.v2
      story_role: "executor"
      can_execute: true
      can_review:
        - research-coverage
        - citation-integrity
      work_contexts:
        - tech-research
        - product-discovery
        - evidence-graded-research
      core_replaces: null
      absorbed_from: ".claude/skills/tech-research/ (v2.0.0)"
      slash_alias: "/tech-research"

  - id: bench-analyst
    name: "Bench Analyst"
    role: "Universal benchmark specialist"
    tier: 1
    specialty: "Universal comparative benchmarking across codebases, LLMs, products, companies, and technologies"
    executor_profile:
      sinkra_type: "Agent"
      human_in_the_loop: true
      output_schema: benchmark-analysis-report
      story_role: "executor"
      can_execute: true
      can_review:
        - benchmark-quality
        - competitive-benchmark
      work_contexts:
        - codebase-benchmarking
        - llm-benchmarking
        - product-comparison
        - company-analysis
        - technology-evaluation
      core_replaces: "@analyst"

  - id: benchmark-runtime
    name: "Benchmark Runtime"
    role: "Worker for deterministic preparation, workspace setup and report publication"
    tier: worker
    specialty: "Filesystem preparation, normalization, artifact persistence"
    executor_profile:
      sinkra_type: "Worker"
      human_in_the_loop: true
      output_schema: runtime-execution-report

  - id: reference-competitor-clone
    name: "Reference Competitor Clone"
    role: "Clone-based adaptation of benchmark patterns and competitor heuristics"
    tier: clone
    specialty: "Pattern transfer, competitor modeling, reusable benchmark framing"
    executor_profile:
      sinkra_type: "Clone"
      human_in_the_loop: true
      output_schema: competitor-pattern-brief

  # ─── Deep Research Pipeline (absorbed from deep-research squad) ────────────
  - id: dr-orchestrator
    name: "DR Orchestrator"
    role: "Research pipeline coordinator — classify, route, enforce QA gates, synthesize"
    tier: orchestrator
    specialty: "Query classification, pipeline routing, quality gates, report synthesis"
    executor_profile:
      sinkra_type: "Agent"
      human_in_the_loop: true
      output_schema: research-pipeline-report

  # Tier 0 — Diagnostic
  - id: sackett
    name: "Sackett"
    role: "PICO question formulation, evidence levels, EBM 5-step workflow"
    tier: 0
    specialty: "Evidence-based medicine methodology"
    executor_profile:
      sinkra_type: "Agent"
      human_in_the_loop: true
      output_schema: pico-question

  - id: booth
    name: "Booth"
    role: "Review methodology selection (14 types), SALSA/STARLITE frameworks"
    tier: 0
    specialty: "Systematic review methodology"
    executor_profile:
      sinkra_type: "Agent"
      human_in_the_loop: true
      output_schema: methodology-selection

  - id: creswell
    name: "Creswell"
    role: "Qualitative/quantitative/mixed methods design, data integration strategy"
    tier: 0
    specialty: "Mixed methods research design"
    executor_profile:
      sinkra_type: "Agent"
      human_in_the_loop: true
      output_schema: research-design

  # Tier 1 — Execution
  - id: forsgren
    name: "Forsgren"
    role: "Technical performance measurement, DORA metrics, DevOps assessment, SPACE framework"
    tier: 1
    specialty: "Engineering performance research"
    executor_profile:
      sinkra_type: "Agent"
      human_in_the_loop: true
      output_schema: performance-assessment

  - id: klein
    name: "Klein"
    role: "Pattern recognition, sensemaking, decision analysis, pre-mortem"
    tier: 1
    specialty: "Naturalistic decision making"
    executor_profile:
      sinkra_type: "Agent"
      human_in_the_loop: true
      output_schema: decision-analysis

  - id: gilad
    name: "Gilad"
    role: "Competitive intelligence, strategic early warning, blind spot detection"
    tier: 1
    specialty: "Strategic competitive intelligence"
    executor_profile:
      sinkra_type: "Agent"
      human_in_the_loop: true
      output_schema: competitive-intel-brief

