auto_clarification:
  description: |
    Automatic context inference from the user query. Runs BEFORE the Strategic
    Brief Builder (Phase P1). Detects focus, domain, temporal intent, and
    product-validation intent. The inferred_context is a SEED for the brief —
    it NEVER skips clarification. The Strategic Brief Builder ALWAYS runs and
    turns the raw query into a structured, copy-pasteable Deep Research brief.
    This section is optional - if missing, the skill falls back to the legacy
    single-question clarification flow (backward compatible).

  patterns:
    technical:
      description: "Keywords indicating technical/code focus"
      keywords:
        - "codigo"
        - "código"
        - "implementar"
        - "implementação"
        - "how to"
        - "como implementar"
        - "como fazer"
        - "api"
        - "bug"
        - "error"
        - "erro"
        - "debug"
        - "code"
        - "implementation"
        - "library"
        - "biblioteca"
        - "sdk"
        - "tutorial"
        - "exemplo"
        - "example"
      inferred_value:
        focus: "technical"

    comparison:
      description: "Keywords indicating comparison focus"
      keywords:
        - "compare"
        - "comparar"
        - "vs"
        - "versus"
        - "diferenca"
        - "diferença"
        - "melhor"
        - "melhor entre"
        - "qual escolher"
        - "alternativa"
        - "alternative"
        - "tradeoff"
        - "pros and cons"
      inferred_value:
        focus: "comparison"

    recent:
      description: "Keywords indicating temporal/recency focus"
      keywords:
        - "latest"
        - "novo"
        - "nova"
        - "2024"
        - "2025"
        - "2026"
        - "atual"
        - "recente"
        - "recent"
        - "new"
        - "last year"
        - "estado da arte"
        - "state of the art"
        - "trending"
      inferred_value:
        temporal: "recent"
        search_constraint: "Append current year range to search queries for freshness"

    academic_signal:
      description: |
        Keywords indicating academic/scholarly research intent. Triggers adapter routing to
        scholarly databases (arXiv, PubMed, Semantic Scholar) before generic WebSearch in Phase 3.
        Added in v1.2.0 (2026-05-18) as part of STORY-154.2 scholarly adapter integration.
      keywords:
        - "arxiv"
        - "pubmed"
        - "paper"
        - "study"
        - "trial"
        - "cohort"
        - "systematic review"
        - "meta-analysis"
        - "peer-reviewed"
        - "systematic review"
        - "clinical trial"
        - "randomized controlled"
        - "academic"
        - "journal"
        - "doi"
        - "preprint"
        - "literature review"
      regex: "arxiv|pubmed|paper|study|trial|cohort|systematic review|meta-analysis|peer-reviewed"
      inferred_value:
        focus: "academic"
        adapter_routing: "scholarly_first"
        search_constraint: "Route to scholarly databases (arXiv/PubMed/Semantic Scholar) before generic WebSearch. Use scholarly_search.py bridge."

    product_validation:
      description: |
        Keywords indicating product idea validation. Triggers --product-discovery mode automatically.
        Added in v1.1.0 (2026-05-11) as bridge to spy:validate-product-idea molecule.
      keywords:
        - "validar ideia"
        - "validar produto"
        - "jtbd"
        - "jobs to be done"
        - "mom test"
        - "smoke test"
        - "willingness to pay"
        - "wtp"
        - "product-market fit"
        - "pmf"
        - "validate idea"
        - "validate product"
        - "lean startup"
        - "mvp validation"
        - "concierge mvp"
        - "blue ocean"
        - "founder-problem fit"
        - "early adopter"
        - "pre-sale"
        - "pré-venda"
      inferred_value:
        focus: "product-discovery"
        mode_flag: "--product-discovery"
        search_constraint: "Use Mom Test interview templates + villain mapping OSINT + blue ocean positioning frameworks instead of generic technical decomposition"
        cross_link:
          consumer: "spy:validate-product-idea"
          framework_ref: "squads/research/data/product-discovery-framework.md"

  technology_detection:
