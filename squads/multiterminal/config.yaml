# MINDS CONSIDERADAS MAS NÃO SELECIONADAS (transparência do processo de pesquisa)
# ═══════════════════════════════════════════════════════════════════════════════
minds_not_selected:
  - name: "Wez Furlong (WezTerm)"
    reason: "Redundante com Mitchell Hashimoto (mesmo ângulo de rewrite moderno do terminal)"
  - name: "Kovid Goyal (Kitty)"
    reason: "Redundante com Mitchell Hashimoto (ângulo contrarian já coberto)"
  - name: "João Moura (CrewAI)"
    reason: "Camada de lib Python de orquestração, não terminal/dashboard"
  - name: "Harrison Chase (LangGraph)"
    reason: "Mesma razão do CrewAI + documentação mais fraca no domínio específico"
  - name: "Simon Willison (LLM CLI)"
    reason: "Excelente, mas escopo é ergonomia de CLI single-tool, não sistemas multiterminal"
  - name: "Fernand Galiana (k9s) / Jesse Duffield (lazygit)"
    reason: "TUIs de domínio único, abaixo do score mínimo de documentação nesta pesquisa"
  - name: "Zach Lloyd (Warp)"
    reason: "Visão de produto forte, metodologia pouco replicável fora do produto comercial"

domain_model:
  declared:
    - label: Diagnóstico
      focus: "avaliar o sistema atual antes de recomendar arquitetura nova"
    - label: Engenharia de Terminal
      focus: "fundação de renderização, protocolo, modelo de sessão/multiplexação"
    - label: TUI/Dashboard
      focus: "estado da UI, componentes, layout multi-painel"
    - label: Orquestração de Agentes
      focus: "loop de execução, dispatch, critério de conclusão"
