# Multiterminal Systems Squad v1.0
# Squad Configuration

pack:
  name: multiterminal
  title: "Multiterminal Systems Squad"
  version: "1.0.0"
  author: "AIOX Team"
  description: >-
    Squad de elite minds para arquitetura de sistemas multiterminal: engenharia de
    multiplexação/terminal, frameworks de TUI/dashboard multi-painel e metodologia de
    orquestração/loop de agentes de IA.
  icon: "🖥️"
  slash_prefix: "multiterminal"

entry_agent: multiterminal-chief
tested: false

metadata:
  version: "1.0.0"
  created_at: "2026-07-21"
  creation_mode: YOLO
  fidelity_estimate: "60-75%"
  fidelity_note: >-
    Squad criado via pesquisa web pública (blogs, talks, entrevistas, GitHub), sem acesso a
    livros/cursos/transcrições licenciadas. Todas as citações e frameworks nos agents carregam
    tag [SOURCE:] quando são citação literal; o restante é síntese razoável do trabalho
    documentado publicamente. Ver bloco `provenance` em cada agent para as fontes usadas.

research_process:
  workflow: wf-mind-research-loop (squad-creator-pro)
  iterations_executed: 3
  broad_list_count: 19
  after_devils_advocate: 12
  after_framework_validation: 10
  final_elite: 5

