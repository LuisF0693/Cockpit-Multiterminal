<!doctype html>
<html>
<head><link rel="stylesheet" href="../../colors_and_type.css"><title>Cobalt Chat</title></head>
<body>
  <aside class="sidebar">
    <h3>Recent chats</h3>
    <ul><li>Project Alpha</li><li>Refactor notes</li></ul>
  </aside>

  <main class="conversation">
    <div class="message user">Hello, can you help?</div>
    <div class="message assistant">Of course! What do you need?</div>
    <div class="message user">Summarize this paragraph.</div>

    <div class="composer">
      <textarea placeholder="Message Cobalt..."></textarea>
      <button class="send">→</button>
    </div>
  </main>
</body>
</html>
