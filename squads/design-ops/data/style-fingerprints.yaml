title: "Style Fingerprints — Visual Archetype Classification"
version: "1.0.0"
generated_at: "2026-04-27"
generated_by: "design-ops via meta-analysis"
purpose: |
  Visual fingerprints (signature vectors) for the 11 canonical DS archetypes
  observed in the 39 reference DS catalog. Used by `extract-from-url` and
  `ds-critical-eye-compare` to classify EXTRACTED visual style against known
  archetypes, so downstream tasks know "this is shadcn-neutral-flavored" or
  "this is carbon-enterprise-flavored" — not just "tokens extracted, good luck".

  The existing `lib/extractors.cjs detectStack()` identifies the TECHNICAL
  stack (Next.js? Tailwind? Radix?). This file complements with VISUAL
  archetype classification. They are orthogonal — a Next.js+Tailwind site
  can render Apple-glass OR Carbon-enterprise OR shadcn-neutral.

method: |
  - For each archetype, observed signature in 1-3 reference DS clones
  - Extracted 5 measurable signals from real CSS/JSON token files:
      1. radius_scale     — how rounded are corners (square/sharp/round/pill)
      2. color_saturation — oklch C value range (or hex saturation %)
      3. spacing_density  — base unit + scale length (compact vs roomy)
      4. typography_weight — heading weight + body weight balance
      5. shadow_intensity — none / subtle / medium / strong
  - Plus 2 categorical signals: theme_palette (mono / branded / colorful)
    and surface_treatment (flat / shadowed / glass / borderless)

# =============================================================================
# Archetype fingerprints
# Each archetype has measurable signal ranges for classification matching
# =============================================================================

archetypes:

  shadcn-neutral:
    description: "shadcn/ui default new-york style. Near-monochrome, slight roundness, system font. Dev tools & generic admin."
    reference_ds: ["shadcn-ui", "primer-react", "geist-ui (close)"]
    signature:
      radius_scale: "moderate"        # 0.375rem-0.625rem base, 7-step
      radius_sample: "0.625rem"
      color_saturation: "near-zero"   # oklch C ≈ 0 for primary; chroma only on destructive/charts
      saturation_sample: "oklch(0.205 0 0)"
      spacing_density: "moderate"     # 4px base, 32-step
      typography_weight: "medium-bold"  # 500 medium body / 600-700 headings
      shadow_intensity: "subtle"      # 0 1-3px rgba 0.05-0.1
      theme_palette: "monochrome"
      surface_treatment: "flat-with-border"
    detection_signals:
      - "oklch() with C≈0 in :root vars"
      - "border + bg-card pattern (no shadow on cards)"
      - "data-theme attribute or .dark class"
      - "@theme inline mapping"
      - "rounded-md / rounded-lg dominates"

  carbon-enterprise:
    description: "IBM Carbon / Salesforce Lightning style. Square/sharp, IBM blue accents, dense info, weak elevation. B2B power-user."
    reference_ds: ["carbon", "lightning-design-system", "fluentui v9"]
    signature:
      radius_scale: "minimal"         # 0-4px; intentionally square for data-density
      radius_sample: "0.25rem (xs only)"
      color_saturation: "moderate"    # IBM blue #0f62fe; #1677ff Ant; semantic-only saturation
      saturation_sample: "hsl(220, 100%, 53%)"
      spacing_density: "compact"      # 8px-grid; 13+ step scale
      typography_weight: "regular-semibold"  # 400 body / 600 headings (IBM Plex)
      shadow_intensity: "none-or-very-subtle"  # cards rely on borders not shadows
      theme_palette: "branded-mono"   # one strong hue (blue/orange) + grayscale
      surface_treatment: "flat-with-border"
    detection_signals:
      - "IBM Plex / Salesforce Sans font detected"
      - "border-radius ≤ 4px on buttons/cards"
      - "Inter-row borders > shadows in tables"
      - "$theme-* / $interactive-* token names (Carbon naming)"
      - "13-step or larger spacing scale"

  material-elevation:
    description: "Google Material Design 2/3. Elevation shadows, slightly rounded, color-rich. Mobile-first, Android, consumer apps."
    reference_ds: ["material-ui", "material-web"]
    signature:
      radius_scale: "moderate"        # 4-12px (M2) or 8-28px (M3)
      radius_sample: "0.25rem-1rem"
      color_saturation: "high"        # tonal palettes with saturated primary
      saturation_sample: "hsl(207, 90%, 54%) — Material Blue 500"
      spacing_density: "moderate"     # 8px-grid
      typography_weight: "regular-medium"  # Roboto 400/500
      shadow_intensity: "strong"      # 5 elevation levels with progressive blur
      theme_palette: "colorful"       # tonal palette, primary/secondary/tertiary
      surface_treatment: "shadowed"
    detection_signals:
      - "Roboto font family"
      - "Multiple z-index elevation levels with shadow stacking"
      - "Material color palette names (primary-500, surface-variant)"
      - "Tonal color tokens (M3)"
      - "FAB / extended FAB patterns"

  polaris-friendly:
    description: "Shopify Polaris. Soft greens, friendly rounded, e-commerce optimistic. Conversion-focused."
    reference_ds: ["polaris-react", "polaris-tokens"]
    signature:
      radius_scale: "moderate-high"   # 6-12px
      radius_sample: "0.5rem"
      color_saturation: "moderate-high"
      saturation_sample: "rgb(0, 132, 142) teal / rgb(80, 184, 60) green"
      spacing_density: "roomy"        # 4/8/12/16/20/32 — large gaps
      typography_weight: "regular-semibold"  # Inter 400/600
      shadow_intensity: "subtle"
      theme_palette: "branded-warm"
      surface_treatment: "soft-shadowed"
    detection_signals:
      - "rgb(...) values (legacy, Polaris uses RGB not oklch)"
      - "spacing-tight / spacing-loose / spacing-extra-loose names"
      - "color-{purple,indigo,teal,green,yellow,orange,red}-* token namespaces"
      - "Inter font family"

  apple-glass:
    description: "Apple HIG. Frosted glass, hairline borders, SF font, generous whitespace, restrained color. Premium consumer."
    reference_ds: ["(no public repo — extracted from apple.com domain in url-extracts)"]
    signature:
      radius_scale: "high"            # 12-22px on cards, infinite on buttons
      radius_sample: "0.875rem-1.375rem"
      color_saturation: "very-low"    # near-grayscale + accent tints
      saturation_sample: "hsl(0, 0%, 96%) on light / hsl(0, 0%, 7%) on dark"
      spacing_density: "very-roomy"   # 4-8-16-24-40-64 with large jumps
      typography_weight: "regular-light-bold"  # SF Pro 400/600/700
      shadow_intensity: "subtle-with-glass"  # backdrop-filter:blur dominates
      theme_palette: "monochrome-with-accent"
      surface_treatment: "glass"      # frosted/translucent surfaces
    detection_signals:
      - "SF Pro / Helvetica Neue font family"
      - "backdrop-filter: blur in CSS"
      - "Hairline 0.5px-1px borders"
      - "ac-globalnav / ac-localnav classes (apple.com markers)"
      - "Min 24px line-heights (1.5x for body)"

  brutalist-mono:
    description: "Vercel/Geist style. High contrast, near-mono, dev-tools-aesthetic. Square or pill, no shadows."
    reference_ds: ["geist-ui", "geist-font (typeface)"]
    signature:
      radius_scale: "varies"          # buttons rounded-full or square
      radius_sample: "0 OR 9999px (pill)"
      color_saturation: "none"        # pure black/white + system accents
      saturation_sample: "#000 / #fff / #888"
      spacing_density: "moderate"
      typography_weight: "regular-bold"  # Geist 400/700, no medium
      shadow_intensity: "none"        # flat by intent
      theme_palette: "monochrome"
      surface_treatment: "flat"
    detection_signals:
      - "Geist Sans / Geist Mono font"
      - "Pure black / pure white near-only colors"
      - "Border 1px subtle for separation"
      - "--geist-* CSS variables (Vercel brand markers)"

  govuk-conservative:
    description: "GOV.UK / USWDS style. High contrast for accessibility, thick borders, square corners, sans-serif. Government/civic."
    reference_ds: ["govuk-frontend", "govuk-design-system", "uswds"]
    signature:
      radius_scale: "minimal"         # 0px on most components
      radius_sample: "0"
      color_saturation: "moderate"    # GOV.UK black/yellow accent only
      saturation_sample: "#1d70b8 (blue) / #ffdd00 (yellow focus ring)"
      spacing_density: "moderate"
      typography_weight: "bold-only"  # 700 dominates; legibility focus
      shadow_intensity: "none"
      theme_palette: "high-contrast"
      surface_treatment: "flat-thick-border"
    detection_signals:
      - "GDS Transport / Public Sans font family"
      - "Yellow (#ffdd00) focus indicator (mandatory)"
      - "Minimum 19px body font size (govuk-body baseline)"
      - "border-radius: 0 on most components"
      - "Skip-link patterns visible"

  porsche-precision:
    description: "Porsche/Audi/auto-luxury style. Sharp angles, restrained luxury color, technical typography. WCAG 2.2 AA strict."
    reference_ds: ["porsche-design-system", "audi-ui (archived)"]
    signature:
      radius_scale: "minimal-to-moderate"  # 4-8px
      radius_sample: "0.25rem-0.5rem"
      color_saturation: "low"          # near-mono with brand accent (Porsche red)
      saturation_sample: "#d5001c (Porsche brand red, used sparingly)"
      spacing_density: "compact-roomy" # mixed; tight in nav, roomy in hero
      typography_weight: "regular-bold"  # Porsche Next 400/700
      shadow_intensity: "none"
      theme_palette: "branded-mono"
      surface_treatment: "flat-with-precise-borders"
    detection_signals:
      - "Porsche Next / Audi Type font family"
      - "WCAG 2.2 AAA compliance markers"
      - "Web Components: <p-*> or <audi-*> custom elements"
      - "Tailwind v4 + custom token namespaces"

  ant-china-enterprise:
    description: "Ant Design / TDesign style. Dense forms, blue-heavy, square corners, Chinese typography support. East Asian B2B."
    reference_ds: ["ant-design", "tdesign-react", "tdesign-vue-next"]
    signature:
      radius_scale: "minimal"         # 4-6px default
      radius_sample: "0.375rem"
      color_saturation: "high"        # Ant blue #1677ff dominant
      saturation_sample: "hsl(215, 100%, 54%)"
      spacing_density: "compact"      # 14px base font, dense forms
      typography_weight: "regular"    # 400 with system fallback for CJK
      shadow_intensity: "subtle"      # cards only
      theme_palette: "branded-saturated"
      surface_treatment: "flat-with-border"
    detection_signals:
      - "Ant brand color #1677ff"
      - "14px body font (Ant default)"
      - "Noto Sans / system-ui Chinese fallbacks"
      - "ant-* class prefix in HTML"
      - "border-radius: 6px on buttons"

  marketing-gradient:
    description: "Stripe / Linear / Notion-marketing style. Gradients, generous whitespace, hero typography. Marketing/landing."
    reference_ds: ["(no canonical OS DS — extracted from stripe.com / linear.app domains)"]
    signature:
      radius_scale: "high"            # 12-24px
      radius_sample: "1rem-1.5rem"
      color_saturation: "high-with-gradients"
      saturation_sample: "linear-gradient + multiple oklch hues"
      spacing_density: "very-roomy"   # large hero margins
      typography_weight: "thin-bold"  # 300/700 contrast common
      shadow_intensity: "medium"      # colored shadows tinted with brand
      theme_palette: "colorful"
      surface_treatment: "gradient"
    detection_signals:
      - "Multiple linear-gradient or radial-gradient declarations"
      - "Hero h1 ≥ 60px"
      - "Large vertical sections (py-32 / 100vh)"
      - "Custom Inter / Inter-derived font"
      - "Backdrop-filter on hero CTAs"

  community-polished:
    description: "Mantine / ChakraUI / HeroUI style. Smooth, multi-color theme system, soft shadows, generous variants. Polished open-source."
    reference_ds: ["mantine", "chakra-ui", "heroui"]
    signature:
      radius_scale: "moderate-high"   # 4-16px
      radius_sample: "0.5rem-1rem"
      color_saturation: "high"        # 14-color named palettes
      saturation_sample: "10-step gray + 13 named colors (Mantine)"
      spacing_density: "moderate"     # 5-step xs-xl
      typography_weight: "regular-bold"  # 400/600/700 (Mantine fontWeights)
      shadow_intensity: "moderate"
      theme_palette: "colorful-themable"
      surface_treatment: "soft-shadowed"
    detection_signals:
      - "MantineProvider / ChakraProvider / NextUIProvider in tree"
      - "10+ named color palettes (blue/cyan/teal/green/etc.)"
      - "primaryColor + primaryShade configuration pattern"
      - "5-step spacing (xs/sm/md/lg/xl)"

# =============================================================================
# CLASSIFICATION ALGORITHM
# How extract-from-url should match extracted tokens against archetypes
# =============================================================================

classification_algorithm:
  description: |
    Given extracted tokens (colors, radius, spacing, typography, shadows from
    `inputs/tokens-detected.json` + `inputs/css-vars-detected.json`), score
    against each archetype by counting signal matches. Highest score wins.
    Ties broken by detection_signals match count.

  scoring:
    weight_per_signal_match: 1.0
    weight_per_detection_signal: 2.0       # detection signals are strong indicators
    minimum_confidence_threshold: 3.0       # below this, classification = "unknown"
    multi_archetype_threshold: 0.8          # if top-2 within 80%, return both as candidates

  signal_extraction_from_inputs:
    radius_scale:
      source_files: ["inputs/css-vars-detected.json", "inputs/tokens-detected.json"]
      logic: "Find --radius-* or border-radius declarations, average the px/rem values"
      mapping:
        "0-2px": "minimal"
        "2-8px": "minimal-to-moderate"
        "6-14px": "moderate"
        "12-24px": "moderate-high"
        "16-32px": "high"

    color_saturation:
      source_files: ["inputs/tokens-detected.json"]
      logic: |
        For each color token, parse format. If oklch(L C H), extract C.
        If hex/hsl, convert to oklch and extract C. Average across primary slots.
      mapping:
        "C ≈ 0 (≤0.02)": "near-zero / monochrome"
        "C 0.02-0.10": "very-low / mono-with-accent"
        "C 0.10-0.18": "moderate"
        "C 0.18-0.30": "high"
        "C > 0.30 OR has gradients": "high-with-gradients"

    spacing_density:
      source_files: ["inputs/tokens-detected.json"]
      logic: "Count distinct spacing values + identify base unit"
      mapping:
        "base 4px, ≥10 steps": "moderate"
        "base 4px, 5-7 steps": "moderate"
        "base 8px, ≥10 steps": "compact"
        "base 4px, 4-6 steps with large jumps (8/16/24/40/64)": "very-roomy"

    typography_weight:
      source_files: ["inputs/font-faces.json"]
      logic: "Detect heading + body weights, classify by gap"
      mapping:
        "regular-only (400)": "regular"
        "400 body + 700 heading": "regular-bold"
        "400 body + 500 + 600 + 700": "regular-medium-semibold-bold (community-polished)"
        "300 + 700 (high contrast)": "thin-bold (marketing-gradient)"
        "700-only": "bold-only (govuk-conservative)"

    shadow_intensity:
      source_files: ["inputs/shadows.json"]
      logic: "Average alpha + spread across all shadow tokens"
      mapping:
        "no shadows or all alpha < 0.05": "none"
        "1-2 small shadows, alpha 0.05-0.10": "subtle"
        "3-4 shadows, alpha 0.10-0.20": "moderate"
        "5+ shadows or alpha > 0.20": "strong"

    surface_treatment:
      detection_logic: |
        - "glass" if backdrop-filter: blur is detected anywhere
        - "shadowed" if shadow_intensity ∈ {moderate, strong}
        - "soft-shadowed" if shadow_intensity == subtle AND radius_scale ∈ {moderate-high, high}
        - "flat-with-border" if border declarations >> shadow declarations
        - "flat-thick-border" if border-width ≥ 3px
        - "flat-with-precise-borders" if border-style: solid + low alpha + no shadows
        - "gradient" if linear-gradient OR radial-gradient detected in token-usage-graph.json

# =============================================================================
# OUTPUT CONTRACT
# What the script writes after classification
# =============================================================================

output_contract:
  file: "{output_dir}/style-fingerprint.json"
  schema:
    extracted_signals:
      radius_scale: "string (one of mapping values)"
      color_saturation: "string"
      spacing_density: "string"
      typography_weight: "string"
      shadow_intensity: "string"
      surface_treatment: "string"
    classification:
      primary_archetype: "string (archetype id) | null"
      confidence_score: "number 0-100"
      secondary_archetype: "string (id) | null (only if multi_archetype_threshold met)"
      explanation: "string (why this archetype matched, signal-by-signal)"
    archetype_distance:
      "{archetype_id}": "number (raw score before normalization)"
      # ... one entry per archetype

# =============================================================================
# Consumers
# =============================================================================

consumed_by:
  scripts:
    - squads/design-ops/scripts/extract-from-url/run.cjs       # Phase 8 (after preview render)
    - squads/design-ops/scripts/extract-from-url/lib/extractors.cjs  # New function: classifyStyle()
  tasks:
    - squads/design-ops/tasks/ds-critical-eye-compare.md       # Compare extracted style vs target archetype
    - squads/design-ops/tasks/design-compare.md                # Cross-DS comparison
    - squads/design-ops/tasks/extract-design-md-from-url.md    # Surface fingerprint in DESIGN.md prose
    - squads/design-ops/tasks/pixel-perfect-clone.md           # Use archetype to bias clone toward closest reference

# =============================================================================
# How this fits with existing detectStack()
# =============================================================================

complementarity_with_detect_stack:
  description: |
    detectStack() in lib/extractors.cjs identifies TECHNICAL stack: Next.js, Tailwind,
    Radix, GSAP, etc. — what tools/libs were used.

    Style fingerprint identifies VISUAL archetype: shadcn-neutral, apple-glass,
    carbon-enterprise, etc. — how it looks and feels.

    They are ORTHOGONAL. Examples:
      - shadcn-ui (lib) typically renders shadcn-neutral (style) — high correlation
      - Next.js (lib) can render any of the 11 archetypes — no correlation
      - GOV.UK uses Nunjucks, not React, but renders govuk-conservative — orthogonal

    Both signals together produce richer classification than either alone.
