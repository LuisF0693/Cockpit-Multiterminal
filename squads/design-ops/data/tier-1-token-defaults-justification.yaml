    - squads/design-ops/tasks/ds-token-w3c-extract.md       # DTCG schema reference
    - squads/design-ops/tasks/f1-apply-foundations.md       # foundation step
    - squads/design-ops/tasks/ds-theme-multi-brand.md       # theming pattern reference
    - squads/design-ops/tasks/emit-design-md.md             # DESIGN.md generation
  workflows:
    - squads/design-ops/workflows/foundations-pipeline.yaml
    - squads/design-ops/workflows/dtcg-tokens-governance.yaml
    - squads/design-ops/workflows/wf-style-dictionary-token-pipeline.yaml
  rules:
    - squads/design-ops/rules/design-md-convention.md
