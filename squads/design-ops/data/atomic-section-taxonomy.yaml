# ── Reorder protocol ──────────────────────────────────────────────────
#
# The reorder script (lib/atomic-section-tools.cjs#reorderSections) operates
# on HTML where each section is preceded by an HTML comment marker like
# `<!-- 01 ATOMS · Color palette -->` followed by `<section class="md-section">`.
#
# Critical bugfix encoded from the 30h session:
#   DO NOT use `<section class="md-section">.*?</section>` (non-greedy)
#   to extract section blocks. Inside Section 09 (app shell), the inner
#   `<section class="md-feed">` close tag fires the non-greedy match
#   prematurely, truncating Section 09 by ~4kB.
#
#   CORRECT: bound each section by next-marker-start position (or footer
#   start) — NOT by `</section>`. See atomic-section-tools.cjs.
#
# The reorder also DEDUPLICATES — when the same content_signature matches
# multiple blocks, take the LARGEST block (preserves the most-evolved version
# after iterative composition).

# ── Allowed deviations ────────────────────────────────────────────────
# Brands without writer surfaces should drop section 11 (Editor). Brands
# without a paywall should drop section 05's paywall sub-component but keep
# the section for member-bar/read-deeper. The validator emits warnings for
# missing sections, never errors. Sequence is enforced when sections ARE
# present.
