# Atomic-Section Taxonomy
#
# Canonical section ordering for design-system preview HTML files (e.g., the
# medium-design.html gold standard). This is the GROUND TRUTH that the
# design-ops scripts/atomic-section-tools.cjs validator and reorderer enforce.
#
# Origin: outputs/sinkra-squad/transform-html-tailwind-gold-standard/as_is_doc.md
# (Phase 02, Phase 06). Promoted from inline session knowledge to canonical
# data per the Wave 4 extraction-rule promotion path.
#
# Each section has:
#   - n: section number (zero-padded 2-digit string used in HTML markers)
#   - id: stable slug
#   - layer: atomic design layer (atoms, molecules, organisms, templates, pages, extraction, guidelines)
#   - title: human-readable
#   - content_signature: prose pattern that identifies this section in HTML
#                       (used by the reorder script to deduplicate after drift)

