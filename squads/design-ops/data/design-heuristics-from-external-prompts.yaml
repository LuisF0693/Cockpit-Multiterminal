# =============================================================================
# EXPLICIT REJECTIONS (claw-design patterns we consciously decline)
# =============================================================================
explicit_rejections:

  - id: REJECT-CLAW-001
    title: "@babel/standalone in-browser JSX as default"
    claw_design_position: >-
      Permits shipping CDN-delivered React + Babel standalone for browser-
      side JSX transformation in self-contained artifacts.
    our_position: >-
      Rejected as default. Our SWC + TypeScript compile-time pipeline is the
      canonical build path. Babel standalone permitted ONLY inside self-
      contained rapid-prototype HTML artifacts under Wave C capability, and
      even there pre-compile is preferred.
    rationale: >-
      Babel standalone adds ~2MB to artifact size, increases parse time, and
      diverges from production code semantics. Pre-compiled JSX keeps the
      artifact consistent with how the same code would behave in our apps.
    enforcement: "squads/design-ops/rules/ds-consistency-policy.md#rejection-1"

  - id: REJECT-CLAW-002
    title: "Uniquely-named inline style objects + window global sharing"
    claw_design_position: >-
      Recommends uniquely naming inline style objects to prevent collisions,
      and sharing React components across UMD-delivered HTML via
      Object.assign(window, {...}).
    our_position: >-
      Rejected as default. Tailwind utility classes eliminate the inline-style
      collision problem entirely, and ES module imports replace window-based
      sharing. This pattern is simply not produced by our stack.
    rationale: >-
      Solving a problem we do not have. Replicating the guidance would add
      noise to our rule surface without preventing any real violation.
    enforcement: >-
      Anomaly detection: flag as unexpected if this pattern appears under
      apps/** or packages/**.

  - id: REJECT-CLAW-003
    title: "Unconstrained oklch harmonic color generation"
    claw_design_position: >-
      Permits oklch harmonic generation whenever the existing palette feels
      too restrictive.
    our_position: >-
      Rejected as default. Oklch harmonic generation is tightly gated by
      ds-consistency-policy.md "Oklch Harmonic Fallback Gate Policy".
      Permitted only for greenfield bootstrap, brownfield audit with owner
      approval, or explicit brief request.
    rationale: >-
      Ad-hoc color generation bypasses workspace tokens and erodes brand
      integrity over time. Tokens are a contract; harmonic generation is a
      divergence pressure valve we refuse to leave unlocked.
    enforcement: "squads/design-ops/rules/ds-consistency-policy.md#the-oklch-harmonic-fallback-gate-policy"

  - id: REJECT-CLAW-004
    title: "Screenshot-based PPTX export as default"
    claw_design_position: >-
      Allows screenshot-based PPTX export as an acceptable default when
      native shape export is complex.
    our_position: >-
      Rejected as default. Native shape export is the default for deliverable
      kind pptx (see deliverable-kinds-registry.yaml#pptx). Screenshot-based
      export is fallback only, and requires brief-level acknowledgement.
    rationale: >-
      Native shape export produces editable slides clients can modify.
      Screenshot-based export produces visually frozen slides — acceptable
      only when the client has explicitly agreed to receive a non-editable
      artifact.
    enforcement: "squads/design-ops/data/deliverable-kinds-registry.yaml#pptx"

  - id: REJECT-CLAW-005
    title: "Tailwind Play CDN as bundling strategy"
    claw_design_position: >-
      Tailwind Play CDN is acceptable for quick prototypes.
    our_position: >-
      Rejected as default. Self-contained artifact bundling uses precompiled
      Tailwind CSS (Path 1) or manual exact-value CSS (Path 3). See
      ds-consistency-policy.md "Self-Contained Artifact Bundling Strategy".
    rationale: >-
      Tailwind Play CDN violates our self-contained-artifact-security.md SRI
      mandate (CDN cannot be integrity-hashed reliably). It also JIT-compiles
      at runtime with semantics that can drift from our production bundler
      output.
    enforcement: "squads/design-ops/rules/ds-consistency-policy.md#path-2-tailwind-play-cdn"

  - id: REJECT-CLAW-006
    title: "Generic 'styles' object names + scope-isolated Babel scripts"
    claw_design_position: >-
      In CDN-delivered React artifacts, name style objects uniquely
      (componentStyles) to avoid cross-file collisions, and share components
      across <script type='text/babel'> blocks via Object.assign(window, ...).
    our_position: >-
      Acknowledged as a valid RULE for Wave C self-contained artifacts when
      using Babel standalone. REJECTED as a pattern for app code (apps/**,
      packages/**) — our ES module + TypeScript pipeline has no scope
      isolation problem and no global sharing requirement.
    rationale: >-
      Babel-standalone scope isolation is a self-contained-artifact concern,
      not an app concern. Replicating the guidance for app code would
      introduce globals where none are needed and obscure import boundaries.
    enforcement: >-
      Wave C validator flags generic 'const styles = {...}' inside Wave C
      artifacts that use Babel standalone. App code flags 'Object.assign(window, ...)'
      as anomaly.
    scope_distinction:
      wave_c_self_contained_artifacts: "Apply the rule — unique names + window sharing"
      app_and_package_code: "Rule does not apply — use ES modules"

  - id: REJECT-CLAW-007
    title: "type='module' on script imports"
    claw_design_position: >-
      Avoid type='module' on script imports in Babel-standalone artifacts:
      'it may break things'.
    our_position: >-
      Acknowledged as a constraint for Wave C Babel-standalone artifacts.
      REJECTED as a pattern for app code — our apps use ES modules as the
      NORM, not the exception.
    rationale: >-
      type='module' semantics break Babel-standalone's implicit-global
      assumption. In bundler-compiled app code, type='module' is correct
      and necessary. The constraint is scope-specific.
    enforcement: >-
      Wave C validator flags type='module' inside Babel-standalone artifacts.
      App code: no enforcement — type='module' is expected.
    scope_distinction:
      wave_c_self_contained_artifacts_using_babel_standalone: "Rule applies — avoid type='module'"
      app_and_package_code: "Rule does NOT apply — type='module' is correct"

