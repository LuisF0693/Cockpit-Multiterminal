# =============================================================================
# HEURISTICS
# =============================================================================
heuristics:

  # --------- ASK / BRIEF ---------
  - id: HEUR-CLAW-001
    family: Process
    title: "Questions-first before any build"
    statement: >-
      Never start a build without a materialized brief with at least 3 measurable success_criteria.
    source: EXT-2026-04-18-CLAW-DESIGN
    confidence: HIGH
    binding:
      template: squads/design-ops/templates/design-brief-intake-tmpl.yaml
      rule: squads/design-ops/rules/design-exploration-cycle.md
      workflow_step: "wf-provider-enrichment-from-external#step-1-intake"

  - id: HEUR-CLAW-002
    family: Process
    title: "Vocalize assumptions before code"
    statement: >-
      State every assumption the brief did not answer explicitly, before writing code. Classify each as user-confirmed, inferred, or guess.
    source: EXT-2026-04-18-CLAW-DESIGN
    confidence: HIGH
    binding:
      rule: squads/design-ops/rules/design-exploration-cycle.md

  # --------- EXPLORATION ---------
  - id: HEUR-CLAW-003
    family: Exploration
    title: "N >= 3 variants along orthogonal axes"
    statement: >-
      Divergent exploration requires at least three variants along axes of match-existing, novel, and constraint-first. Convergence is decided by success_criteria, not aesthetic preference.
    source: EXT-2026-04-18-CLAW-DESIGN
    confidence: HIGH
    binding:
      task_step: "squads/design-ops/tasks/ds-build-component.md#step-0-divergent-exploration"
      workflow_step: "wf-provider-enrichment-from-external#step-2-divergent-exploration"

  - id: HEUR-CLAW-004
    family: Exploration
    title: "Show early before polish"
    statement: >-
      Surface the chosen variant as a working skeleton before final styling, tests, or documentation. Polish applied to the wrong direction is wasted motion.
    source: EXT-2026-04-18-CLAW-DESIGN
    confidence: HIGH
    binding:
      rule: squads/design-ops/rules/design-exploration-cycle.md
      future_gate: "Wave C: explicit show-early workflow step"

  # --------- AI TROPE GUARDRAILS ---------
  - id: HEUR-CLAW-005
    family: Visual
    title: "3-5 colors total per surface"
    statement: "One primary brand + 2-3 neutrals + 1-2 accents. Never exceed 5 without explicit permission."
    source: EXT-2026-04-18-CLAW-DESIGN
    confidence: HIGH
    binding:
      rule: squads/design-ops/rules/ai-trope-guardrails.md#colors
      checklist: squads/design-ops/checklists/dops-ai-trope-guardrails.yaml#color_constraints

  - id: HEUR-CLAW-006
    family: Visual
    title: "Never prominent purple without business rationale"
    statement: "Purple/violet is an AI-default signal. Use only when brand tokens explicitly demand it."
    source: EXT-2026-04-18-CLAW-DESIGN
    confidence: MEDIUM
    binding:
      rule: squads/design-ops/rules/ai-trope-guardrails.md#colors

  - id: HEUR-CLAW-007
    family: Visual
    title: "No opposing temperature gradients"
    statement: "Gradients must be analogous (blue-teal, purple-pink). Never pink-green, orange-blue."
    source: EXT-2026-04-18-CLAW-DESIGN
    confidence: HIGH
    binding:
      rule: squads/design-ops/rules/ai-trope-guardrails.md#colors

  - id: HEUR-CLAW-008
    family: Typography
    title: "Max 2 font families, body >= 14px, line-height 1.4-1.6"
    statement: "Decorative fonts never for body. Inter/Roboto permitted only with rationale."
    source: EXT-2026-04-18-CLAW-DESIGN
    confidence: HIGH
    binding:
      rule: squads/design-ops/rules/ai-trope-guardrails.md#typography

  - id: HEUR-CLAW-009
    family: Iconography
    title: "Never emoji as functional icons"
    statement: "Emoji are narrative; icons are system. Icon sizes: 16, 20, or 24 only."
    source: EXT-2026-04-18-CLAW-DESIGN
    confidence: HIGH
    binding:
      rule: squads/design-ops/rules/ai-trope-guardrails.md#iconography

  - id: HEUR-CLAW-010
    family: Interaction
    title: "Never use scrollIntoView"
    statement: "Breaks embedded webviews and preview panes. Use scroll container APIs instead."
    source: EXT-2026-04-18-CLAW-DESIGN
    confidence: HIGH
    binding:
      rule: squads/design-ops/rules/ai-trope-guardrails.md#motion-interaction

  # --------- SIZING ---------
  - id: HEUR-CLAW-011
    family: Sizing
    title: "Deck text >= 24px"
    statement: "Readable from the back of the room."
    source: EXT-2026-04-18-CLAW-DESIGN
    confidence: HIGH
    binding:
      rule: squads/design-ops/rules/ai-trope-guardrails.md#minimum-sizing
      deliverable_kind: "deliverable-kinds-registry.yaml#deck"

  - id: HEUR-CLAW-012
    family: Sizing
    title: "Mobile touch targets >= 44x44 px"
    statement: "iOS/Android HIG. Enforced across interactive elements."
    source: EXT-2026-04-18-CLAW-DESIGN
    confidence: HIGH
    binding:
      rule: squads/design-ops/rules/ai-trope-guardrails.md#minimum-sizing

  - id: HEUR-CLAW-013
    family: Sizing
    title: "iOS input >= 16px to prevent zoom-on-focus"
    statement: "Safari iOS zooms on focus if input text < 16px. Accessibility + UX."
    source: EXT-2026-04-18-CLAW-DESIGN
    confidence: HIGH
    binding:
      rule: squads/design-ops/rules/ai-trope-guardrails.md#minimum-sizing

  - id: HEUR-CLAW-014
    family: Sizing
    title: "Print body >= 12pt"
    statement: "Print legibility floor for PDF deliverables."
    source: EXT-2026-04-18-CLAW-DESIGN
    confidence: HIGH
    binding:
      rule: squads/design-ops/rules/ai-trope-guardrails.md#minimum-sizing
      deliverable_kind: "deliverable-kinds-registry.yaml#pdf"

  # --------- RESPONSIVE SCALING ---------
  - id: HEUR-CLAW-015
    family: Responsive
    title: "Fixed-size content uses transform: scale() with letterbox"
    statement: "Decks and videos must scale to viewport with letterboxing, not hard pixel lock."
    source: EXT-2026-04-18-CLAW-DESIGN
    confidence: HIGH
    binding:
      checklist: squads/design-ops/checklists/dops-component-quality.yaml#responsive_scaling
      deliverable_kind: "deliverable-kinds-registry.yaml#deck"

  # --------- SECURITY ---------
  - id: HEUR-CLAW-016
    family: Security
    title: "Pin CDN versions and include integrity hashes"
    statement: "Self-contained HTML artifacts ship with exact versions + SRI hashes on every <script>."
    source: EXT-2026-04-18-CLAW-DESIGN
    confidence: HIGH
    binding:
      rule: squads/design-ops/rules/self-contained-artifact-security.md#dependency-pinning

  - id: HEUR-CLAW-017
    family: Security
    title: "Canvas images require crossOrigin=anonymous"
    statement: "Set before src to prevent silent canvas tainting."
    source: EXT-2026-04-18-CLAW-DESIGN
    confidence: HIGH
    binding:
      rule: squads/design-ops/rules/self-contained-artifact-security.md#image-asset-loading

  - id: HEUR-CLAW-018
    family: Security
    title: "Namespace window and localStorage keys per artifact"
    statement: "Prevents collisions when artifact is embedded in a host page."
    source: EXT-2026-04-18-CLAW-DESIGN
    confidence: HIGH
    binding:
      rule: squads/design-ops/rules/self-contained-artifact-security.md#global-state-hygiene

  # --------- CONTEXT GATHERING ---------
  - id: HEUR-CLAW-019
    family: Engineering
    title: "Read all search matches, not the first"
    statement: "The canonical match is usually the most-referenced, not the first returned."
    source: EXT-2026-04-18-CLAW-DESIGN
    confidence: HIGH
    binding:
      rule: squads/design-ops/rules/context-gathering-protocol.md

  - id: HEUR-CLAW-020
    family: Engineering
    title: "Inspect parents before editing children for layout bugs"
    statement: "Layout issues in a child are usually parent constraints, not child code."
    source: EXT-2026-04-18-CLAW-DESIGN
    confidence: HIGH
    binding:
      rule: squads/design-ops/rules/context-gathering-protocol.md

  - id: HEUR-CLAW-021
    family: Engineering
    title: "Parallel tool calls for independent reads"
    statement: "Sequential reads for data with no dependency wastes budget."
    source: EXT-2026-04-18-CLAW-DESIGN
    confidence: HIGH
    binding:
      rule: squads/design-ops/rules/context-gathering-protocol.md

  # --------- ENGINEERING (DATA) ---------
  - id: HEUR-CLAW-022
    family: Engineering
    title: "No localStorage for data persistence"
    statement: "Real backend (Supabase, Neon) by default. localStorage only for ephemeral state like playback position."
    source: EXT-2026-04-18-CLAW-DESIGN
    confidence: HIGH
    binding:
      data_contract: squads/design-ops/data/deck-contracts-spec.yaml#playback_persistence
      external_rule: squads/design-ops/rules/v0-frontend-quality.md#data-persistence

  - id: HEUR-CLAW-023
    family: Engineering
    title: "No fetch in useEffect"
    statement: "Pass data from RSC or use SWR. useEffect fetching causes waterfall latency and race conditions."
    source: EXT-2026-04-18-CLAW-DESIGN
    confidence: HIGH
    binding:
      external_rule: squads/design-ops/rules/v0-frontend-quality.md#coding-guidelines

  # --------- FILE GOVERNANCE ---------
  - id: HEUR-CLAW-024
    family: Governance
    title: "File size < 1000 lines, split into modules"
    statement: "Beyond 1000 lines, split. One massive page.tsx is a code smell and a review-blocker."
    source: EXT-2026-04-18-CLAW-DESIGN
    confidence: MEDIUM
    binding:
      data: squads/design-ops/data/artifact-file-governance.yaml#size_limits

  - id: HEUR-CLAW-025
    family: Governance
    title: "Versioning via file renaming (Name.html -> Name v2.html)"
    statement: "Preserve historical artifact versions on disk rather than overwriting."
    source: EXT-2026-04-18-CLAW-DESIGN
    confidence: MEDIUM
    binding:
      data: squads/design-ops/data/artifact-file-governance.yaml#versioning

  # --------- DECK CONTRACTS ---------
  - id: HEUR-CLAW-026
    family: Contract
    title: "Speaker notes postMessage contract"
    statement: "Decks expose slide change events via postMessage with {slideIndexChanged: N}. Notes JSON stored in <script type='application/json' id='speaker-notes'>."
    source: EXT-2026-04-18-CLAW-DESIGN
    confidence: HIGH
    binding:
      data: squads/design-ops/data/deck-contracts-spec.yaml#speaker_notes_protocol

  - id: HEUR-CLAW-027
    family: Visual
    title: "No title screens for prototypes"
    statement: "Prototypes open directly to content. Title screens are for pitch decks, not prototypes."
    source: EXT-2026-04-18-CLAW-DESIGN
    confidence: MEDIUM
    binding:
      rule: squads/design-ops/rules/ai-trope-guardrails.md#layout

  # --------- WAVE B.2.1 — CONSISTENCY MECHANISMS ---------
  - id: HEUR-CLAW-028
    family: Fidelity
    title: "Pixel fidelity to the repo, not recollection"
    statement: >-
      Read token values from the canonical source every time. Generating values
      from memory or approximation is a contract violation.
    source: EXT-2026-04-18-CLAW-DESIGN
    confidence: HIGH
    binding:
      rule: squads/design-ops/rules/design-system-fidelity.md#r1

  - id: HEUR-CLAW-029
    family: Fidelity
    title: "Exact values only (hex, spacing, font stack, radii)"
    statement: >-
      Use exact hex codes, spacing scale values, font stacks, and border radii
      from the token source. Never approximate.
    source: EXT-2026-04-18-CLAW-DESIGN
    confidence: HIGH
    binding:
      rule: squads/design-ops/rules/design-system-fidelity.md#r2

  - id: HEUR-CLAW-030
    family: Fidelity
    title: "Copy assets, do not reference them at runtime"
    statement: >-
      For self-contained artifacts, copy the needed assets (tokens, components,
      compiled styles) into the artifact. Runtime references create hidden
      consistency debt.
    source: EXT-2026-04-18-CLAW-DESIGN
    confidence: HIGH
    binding:
      rule: squads/design-ops/rules/ds-consistency-policy.md#consistency-model-by-deliverable-kind
      scope: "self-contained kinds only (html_prototype, deck, pdf)"

  - id: HEUR-CLAW-031
    family: Process
    title: "From-scratch is a LAST RESORT"
    statement: >-
      Mocking a full product from scratch without reference context leads to
      poor design. Always search for prior art first (REUSE > ADAPT > CREATE).
    source: EXT-2026-04-18-CLAW-DESIGN
    confidence: HIGH
    binding:
      rule: squads/design-ops/rules/design-system-fidelity.md#r3

  - id: HEUR-CLAW-032
    family: Process
    title: "Starting without DS context is a blocker"
    statement: >-
      An artifact without resolved design-system context is assumed, not
      started. Halt until workspace contracts or a reference DS resolves.
    source: EXT-2026-04-18-CLAW-DESIGN
    confidence: HIGH
    binding:
      rule: squads/design-ops/rules/design-system-fidelity.md#r4
      registry: squads/design-ops/data/ds-discovery-paths.yaml#resolution_protocol

  - id: HEUR-CLAW-033
    family: Process
    title: "User-asked divergence before novel exploration"
    statement: >-
      For component-kind deliverables, ask the requester whether they want
      DS-first, novel, or mixed variants before generating. Silent novelty
      erodes DS grammar.
    source: EXT-2026-04-18-CLAW-DESIGN
    confidence: HIGH
    binding:
      rule: squads/design-ops/rules/design-exploration-cycle.md#1a-divergence-willingness-gate
      policy: squads/design-ops/rules/ds-consistency-policy.md#divergent-exploration-kind-aware-policy

  - id: HEUR-CLAW-034
    family: Fidelity
    title: "Match visual vocabulary beyond tokens (tone, density, hover, shadows)"
    statement: >-
      Tokens are necessary but insufficient. Also match copywriting tone,
      density, interactive rhythm, shadow grammar, and motion personality of
      the existing surface.
    source: EXT-2026-04-18-CLAW-DESIGN
    confidence: HIGH
    binding:
      rule: squads/design-ops/rules/design-system-fidelity.md#r5
      related_rule: squads/design-ops/rules/context-gathering-protocol.md

  # --------- WAVE B.2.2 — VERBATIM DEEP DIVE ---------
  - id: HEUR-CLAW-035
    family: Process
    title: "Questions_v2 mandatory escape-hatch options"
    statement: >-
      Every structured text-option / svg-option question MUST include 'Explore
      a few options', 'Decide for me', and 'Other'. Without them the user is
      forced into a false dichotomy.
    source: EXT-2026-04-18-CLAW-DESIGN
    confidence: HIGH
    binding:
      data: squads/design-ops/data/questions-intake-protocol-spec.yaml#question_kinds

  - id: HEUR-CLAW-036
    family: Process
    title: "Ask too many questions, not too few"
    statement: >-
      Err on the verbose side. Missing context compounds; over-asking is
      recoverable. The user can skip what they do not want to answer.
    source: EXT-2026-04-18-CLAW-DESIGN
    confidence: HIGH
    binding:
      data: squads/design-ops/data/questions-intake-protocol-spec.yaml#protocol#verbosity_rule

  - id: HEUR-CLAW-037
    family: Process
    title: "Slider ranges should be generous"
    statement: >-
      Users often want to push numeric values further than the agent would
      predict. Tight bounds only when physically meaningful (opacity 0-1,
      volume 0-100).
    source: EXT-2026-04-18-CLAW-DESIGN
    confidence: MEDIUM
    binding:
      data: squads/design-ops/data/questions-intake-protocol-spec.yaml#question_kinds#slider

  - id: HEUR-CLAW-038
    family: Process
    title: "Questions: most important first, stream in priority order"
    statement: >-
      If the user answers the first few and stops, the agent still has the
      highest-leverage information. Decorative questions last.
    source: EXT-2026-04-18-CLAW-DESIGN
    confidence: HIGH
    binding:
      data: squads/design-ops/data/questions-intake-protocol-spec.yaml#ordering

  - id: HEUR-CLAW-039
    family: Contract
    title: "Tweak Protocol: register listener BEFORE announcing availability"
    statement: >-
      If __edit_mode_available is posted before the message listener is
      registered, the host's activate message can land before the handler
      exists and the toggle silently does nothing. This is the single most
      common failure mode of the protocol.
    source: EXT-2026-04-18-CLAW-DESIGN
    confidence: HIGH
    binding:
      data: squads/design-ops/data/tweak-protocol-spec.yaml#event_sequence

  - id: HEUR-CLAW-040
    family: Contract
    title: "TWEAK_DEFAULS block must be strict JSON with EDITMODE markers"
    statement: >-
      Exactly one /*EDITMODE-BEGIN*/{...}/*EDITMODE-END*/ block per artifact,
      inside inline <script>. Must be valid JSON (double-quoted keys, no
      trailing commas, no JS expressions). Host parses and rewrites on
      persistence — malformed JSON = silent persistence failure.
    source: EXT-2026-04-18-CLAW-DESIGN
    confidence: HIGH
    binding:
      data: squads/design-ops/data/tweak-protocol-spec.yaml#tweak_defauls_block

  - id: HEUR-CLAW-041
    family: Contract
    title: "super_inline_html requires __bundler_thumbnail template"
    statement: >-
      Any artifact bundled via the deterministic browser-side bundler MUST
      include a <template id="__bundler_thumbnail"> with a colorful-bg
      iconographic SVG (~30% padding). Shown as splash during unpack and as
      no-JS fallback.
    source: EXT-2026-04-18-CLAW-DESIGN
    confidence: HIGH
    binding:
      data: squads/design-ops/data/export-contracts-spec.yaml#super_inline_bundle#thumbnail_template_requirement

  - id: HEUR-CLAW-042
    family: Contract
    title: "Speaker notes are OPT-IN — never add without explicit request"
    statement: >-
      Speaker notes are a content commitment, not a default. Adding them
      unasked creates unrequested work and implies the deck needs a presenter.
    source: EXT-2026-04-18-CLAW-DESIGN
    confidence: HIGH
    binding:
      data: squads/design-ops/data/deck-contracts-spec.yaml#speaker_notes_protocol#opt_in_rule

  - id: HEUR-CLAW-043
    family: Contract
    title: "Speaker notes format: full conversational script, not bullet mirror"
    statement: >-
      When speaker notes are requested, write them as a performance script in
      conversational language. Mirror-of-slide-bullets is an anti-pattern —
      either merge with the slide text or rewrite as what the presenter will
      SAY.
    source: EXT-2026-04-18-CLAW-DESIGN
    confidence: HIGH
    binding:
      data: squads/design-ops/data/deck-contracts-spec.yaml#speaker_notes_protocol#content_style_when_requested

  - id: HEUR-CLAW-044
    family: Process
    title: "Cross-project assets: COPY into this project, do not reference"
    statement: >-
      Files from /projects/<projectId>/ are read-only reference material.
      They CANNOT be used as img urls or runtime references in your HTML
      output. Copy what you need into the current project.
    source: EXT-2026-04-18-CLAW-DESIGN
    confidence: HIGH
    binding:
      rule: squads/design-ops/rules/context-gathering-protocol.md
      scope: "self-contained artifact creation"

  - id: HEUR-CLAW-045
    family: Visual
    title: "Overused font list (forbidden defaults without rationale)"
    statement: >-
      Forbidden as silent defaults: Inter, Roboto, Arial, Fraunces, generic
      system font stacks. Permitted only when the workspace tokens specify
      one (= rationale) or the user explicitly asks.
    source: EXT-2026-04-18-CLAW-DESIGN
    confidence: HIGH
    binding:
      rule: squads/design-ops/rules/ai-trope-guardrails.md#typography

  - id: HEUR-CLAW-046
    family: Visual
    title: "No rounded-corner-with-left-border-accent card trope"
    statement: >-
      Container cards using rounded corners + a left-border accent color are
      a specific AI-generator tell. Use the DS card pattern or design one
      intentionally.
    source: EXT-2026-04-18-CLAW-DESIGN
    confidence: HIGH
    binding:
      rule: squads/design-ops/rules/ai-trope-guardrails.md#layout

  - id: HEUR-CLAW-047
    family: Visual
    title: "Emoji policy: only if DS opts in (default is no emoji)"
    statement: >-
      Default position: no emoji. Design-system-level opt-in is the only
      override. Never add emoji 'for friendliness' without DS authorization.
    source: EXT-2026-04-18-CLAW-DESIGN
    confidence: HIGH
    binding:
      rule: squads/design-ops/rules/ai-trope-guardrails.md#iconography

  - id: HEUR-CLAW-048
    family: Visual
    title: "Ask before adding filler material"
    statement: >-
      If you think additional sections, pages, copy, or content would improve
      the design, ASK the user first rather than unilaterally adding it.
      Every element earns its place.
    source: EXT-2026-04-18-CLAW-DESIGN
    confidence: HIGH
    binding:
      rule: squads/design-ops/rules/ai-trope-guardrails.md#layout

  - id: HEUR-CLAW-049
    family: Animation
    title: "Stage + Sprite primitives before a motion library"
    statement: >-
      Timeline animations start from the Stage + Sprite + useTime/useSprite +
      Easing + interpolate primitives. Reach for Popmotion (pinned) only when
      the starter genuinely cannot express the motion.
    source: EXT-2026-04-18-CLAW-DESIGN
    confidence: HIGH
    binding:
      data: squads/design-ops/data/animation-primitives-contract.yaml

  - id: HEUR-CLAW-050
    family: Engineering
    title: "Verify after done, not instead of done"
    statement: >-
      End-of-turn sequence is: call `done` (opens user preview + returns
      console errors) -> fix until clean -> call fork_verifier_agent for
      background full-sweep verification. Verification is additive to the
      explicit checkpoint, not a replacement for it.
    source: EXT-2026-04-18-CLAW-DESIGN
    confidence: HIGH
    binding:
      workflow: "squads/design-ops/workflows/wf-provider-enrichment-from-external.yaml"
      future_capability: "Wave C verifier agent"

  # --------- WAVE B.5 — DEEP ANALYSIS PASS #3 (raw file grep) ---------
  - id: HEUR-CLAW-051
    family: Runtime
    title: "HTML artifacts can call Claude via window.claude.complete()"
    statement: >-
      Built-in helper. No SDK or API key. Uses claude-haiku-4-5 with 1024-token
      cap, fixed. Rate-limited per user. Shared artifacts consume viewer's quota.
    source: EXT-2026-04-18-CLAW-DESIGN
    source_line: 131-147
    confidence: HIGH
    impact: HIGH  # new capability class
    binding:
      contract: squads/design-ops/data/window-claude-complete-contract.yaml

  - id: HEUR-CLAW-052
    family: Metadata
    title: "[data-screen-label] attribute marks slides/screens for comment context"
    statement: >-
      Put [data-screen-label] on slide/screen root elements. Labels like
      "01 Title", "02 Agenda" — 1-indexed to match what user sees. Surfaces
      in dom: line of <mentioned-element> blocks so comments resolve correctly.
    source: EXT-2026-04-18-CLAW-DESIGN
    source_line: 54-57
    confidence: HIGH
    binding:
      spec: squads/design-ops/data/deck-contracts-spec.yaml#deck_shell#data_attributes_contract

  - id: HEUR-CLAW-053
    family: Process
    title: "Slide indices are 1-indexed — never 0-indexed"
    statement: >-
      When user says "slide 5" they mean the 5th slide (label "05"), never
      array position [4]. Humans don't speak 0-indexed. If labels are
      0-indexed, every reference is off by one.
    source: EXT-2026-04-18-CLAW-DESIGN
    source_line: 57
