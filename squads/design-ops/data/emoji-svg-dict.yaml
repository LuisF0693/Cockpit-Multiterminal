  "🏠":
    name: home
    svg: '<svg viewBox="0 0 24 24" width="1em" height="1em" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 12l9-9 9 9M5 10v9h14v-9"/></svg>'

# ── Typographic glyphs preserved (NOT replaced) ────────────────────
# These are typography, not emojis, and do NOT get replaced:
#   — em-dash, – en-dash
#   … ellipsis, " " curly quotes, ' ' single curly quotes
#   © ® ™ legal marks
#   °  degree sign
#   ÷ × ± mathematical operators
preserved_glyphs:
  - "—"
  - "–"
  - "…"
  - "\""
  - "\""
  - "'"
  - "'"
  - "©"
  - "®"
  - "™"
  - "°"
  - "÷"
  - "×"
  - "±"
