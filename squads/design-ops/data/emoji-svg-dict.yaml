# Emoji → Inline SVG Dictionary
#
# Canonical mapping of Unicode emojis to inline-SVG line icons that use
# `currentColor` for inheritance. Origin: medium gold-standard 30h session
# Phase 09 ("nao use emoji em nenhum lugar, está totalmente proibido devemos
# usar uma biblioteca de icones próxima ou os próprios SVGs da marca").
#
# This dictionary represents CONSCIOUS DESIGN DECISIONS, not extraction.
# Polish utilities use it to replace emojis (which are not brand-faithful)
# with line-icon equivalents.
#
# Style rules for new entries:
#   - Use stroke="currentColor" + fill="none" for line icons (or fill="currentColor" for solid glyphs)
#   - viewBox="0 0 24 24" for outline icons
#   - viewBox="0 0 16 16" for inline-text glyphs (smaller)
#   - aria-hidden="true" on every icon (text adjacent provides semantics)
#   - Stroke width 1.5 for outline icons (medium stroke weight)
#
# When an emoji has no entry, the replace script LEAVES IT IN PLACE and emits
# a warning. Honest reporting > silent fallback.

version: "1.0.0"
owner: design-ops
created: "2026-05-06"

mappings:
  # Stars / quality
  "★":
    name: star-filled
    svg: '<svg viewBox="0 0 16 16" width="1em" height="1em" fill="currentColor" aria-hidden="true"><path d="M8 1.5l2 4.7 5 .4-3.8 3.3 1.2 5-4.4-2.7-4.4 2.7 1.2-5L1 6.6l5-.4z"/></svg>'
  "⭐":
    name: star-filled
    svg: '<svg viewBox="0 0 16 16" width="1em" height="1em" fill="currentColor" aria-hidden="true"><path d="M8 1.5l2 4.7 5 .4-3.8 3.3 1.2 5-4.4-2.7-4.4 2.7 1.2-5L1 6.6l5-.4z"/></svg>'

  # Check / done
  "✓":
    name: check
    svg: '<svg viewBox="0 0 16 16" width="1em" height="1em" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 8l3.5 3.5L13 5"/></svg>'
  "✔":
    name: check
    svg: '<svg viewBox="0 0 16 16" width="1em" height="1em" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 8l3.5 3.5L13 5"/></svg>'
  "✦":
    name: sparkle
    svg: '<svg viewBox="0 0 16 16" width="1em" height="1em" fill="currentColor" aria-hidden="true"><path d="M8 0l1.5 5.5L15 8l-5.5 1.5L8 16l-1.5-5.5L0 9l5.5-1L8 0z"/></svg>'

  # Arrows
  "→":
    name: arrow-right
    svg: '<svg viewBox="0 0 16 16" width="1em" height="1em" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 8h10M9 4l4 4-4 4"/></svg>'
  "←":
    name: arrow-left
    svg: '<svg viewBox="0 0 16 16" width="1em" height="1em" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M13 8H3M7 4l-4 4 4 4"/></svg>'
  "↪":
    name: arrow-return
    svg: '<svg viewBox="0 0 16 16" width="1em" height="1em" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 5h7a3 3 0 010 6H7M6 8l-3 3 3 3"/></svg>'

  # Geometry
  "⊕":
    name: plus-circle
    svg: '<svg viewBox="0 0 16 16" width="1em" height="1em" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true"><circle cx="8" cy="8" r="6.5"/><path d="M8 5v6M5 8h6" stroke-linecap="round"/></svg>'
  "⌂":
    name: home
    svg: '<svg viewBox="0 0 24 24" width="1em" height="1em" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 12l9-9 9 9M5 10v9h14v-9"/></svg>'
  "⌕":
    name: search
    svg: '<svg viewBox="0 0 16 16" width="1em" height="1em" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="7" cy="7" r="4.5"/><path d="M10.5 10.5L14 14"/></svg>'
  "☰":
    name: menu
    svg: '<svg viewBox="0 0 24 24" width="1em" height="1em" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" aria-hidden="true"><path d="M3 6h18M3 12h18M3 18h18"/></svg>'
  "⚙":
    name: settings
    svg: '<svg viewBox="0 0 24 24" width="1em" height="1em" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 11-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 11-4 0v-.09a1.65 1.65 0 00-1-1.51 1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 11-2.83-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 110-4h.09a1.65 1.65 0 001.51-1 1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 112.83-2.83l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 114 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 112.83 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 110 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>'

  # Status
  "❓":
    name: question
    svg: '<svg viewBox="0 0 16 16" width="1em" height="1em" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true"><circle cx="8" cy="8" r="6.5"/><path d="M6 6.5a2 2 0 113 1.5c-.7.4-1 1-1 1.5M8 12.5h.01" stroke-linecap="round"/></svg>'

  # Common emoji
  "📚":
