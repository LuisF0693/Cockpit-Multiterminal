pack:
  name: aiox-design
  version: "2.1.0"
  description: >-
    AIOX-specific brand execution squad. Focuses on visual identity, brand components,
    and design implementation for AIOX products. For shared DS infrastructure
    (tokens, registries, page-types, motion-primitives), defers to design-system squad as SOT.

name: aiox-design
version: 2.1.0
slashPrefix: DS
title: AIOX Design Execution Squad
description: >-
  AIOX-specific brand execution squad. Focuses on visual identity, brand components,
  and design implementation for AIOX products. For shared DS infrastructure
  (tokens, registries, page-types, motion-primitives), defers to design-system squad as SOT.
author: AIOX Team
icon: 🎨
type: specialist

# SOT Reference — Design System registries live in the canonical squad
# ds-page-types-registry and motion-primitives-registry are NOT duplicated here.
# Reference: squads/design-system/data/ (SOT per RT-2026-03-29 decision)
upstream_sot:
  squad: design-system
  registries:
    - squads/design-system/data/ds-page-types-registry.yaml
    - squads/design-system/data/motion-primitives-registry.yaml
entry_agent: design-chief
settings:
  activation:
    show_context_report: true
    show_preload_report: true
    show_quick_commands: true
    quick_commands_limit: 6
  preload:
    max_token_files: 5
    max_blueprint_files: 3
independence: true
independence_details: |
  This squad is completely self-contained:
  - No database required
  - No external APIs
  - Works with any codebase (React, Vue, HTML/CSS)
  - All operations are filesystem-based
dependencies:
  optional:
    - name: Node.js
      version: '>=18.0'
      description: For component generation and npm packages
    - name: Tailwind CSS
      version: '>=4.0.0'
      description: CSS-first token system with @theme
    - name: shadcn/ui CLI
      version: latest
      description: Registry-first component distribution
metadata:
  version: 2.1.0
  score: 10
workspace_integration:
  level: controlled_runtime_consumer
  rationale: >-
    Design squad depende de contexto canônico de Design System por BU/app, mas não é owner da integração com workspace.
    O gate de readiness vem do COO e o squad só expande contexto local depois de receber liberação.
  read_paths:
    - workspace/_system/config.yaml
    - workspace/businesses/
  write_paths: []
  readiness_owner: workspace-chief
  readiness_resolver: squads/workspace-governance-legacy/scripts/resolve-squad-workspace-readiness.cjs
tier_system:
  tier_0_foundation:
    description: Entry point agents for operations and adoption strategy
    agents: []
  tier_1_masters:
    description: Execution masters with specialist practices
    agents: []
  tier_2_specialists:
    description: Deep specialists for DS implementation
    agents: []
  orchestrator:
    description: Routes requests
    agent: design-chief
agents:
