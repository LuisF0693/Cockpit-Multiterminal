pack:
  name: design-system
  version: "2.1.0"
  description: >-
    Squad provider/core transitório do futuro design-ops, com runtime técnico
    para aiox-design-starter. Especializado em tokens, foundations,
    componentes, acessibilidade, registry, metadata machine-readable,
    DesignOps e delivery local-first.
  icon: "🎨"
  author: Synkra Hub
  slashPrefix: DS
  title: Design System Squad

type: specialist

# --- Hub Governance (Story 60.8) ---
bu_mapping: "hub-framework"

artifact_contracts:
  - artifact_id: "ds-health-report"
    template_path: "templates/ds-health-report-tmpl.md"
    lifecycle_states: [draft, validated, approved]
  - artifact_id: "ds-migration-strategy"
    template_path: "templates/ds-migration-strategy-tmpl.md"
    lifecycle_states: [draft, validated, approved, superseded, archived]
  - artifact_id: "ds-tokens-schema"
    template_path: "templates/ds-tokens-schema-tmpl.yaml"
    lifecycle_states: [draft, validated, approved]
  - artifact_id: "design-fidelity-report"
    template_path: "templates/design-fidelity-report-tmpl.md"
    lifecycle_states: [draft, validated, approved]
  - artifact_id: "critical-eye-cycle-report"
    template_path: "templates/critical-eye-cycle-report-tmpl.md"
    lifecycle_states: [draft, validated, approved]

supported_modes:
  - CRIAR
  - VALIDAR
  - CONFIGURAR
entry_agent: design-chief
domain_model:
  Strategic:
    label: "Estratégico"
    scope: "Governança, DesignOps, auditoria estrutural e decisões de adoção"
  Tactical:
    label: "Tático"
    scope: "Tokens, foundations, componentes, documentação e contratos públicos do sistema"
  Operational:
    label: "Operacional"
    scope: "Validação, scans, métricas, Storybook e execução de checks do provider"
logging:
  runtime_audit: true
  error_behavior: fail_loud
  error_handling:
    on_validation_fail: block_publish
    on_handoff_fail: emit_recovery_handoff
    on_runtime_error: preserve_partial_artifact
composition_mapping:
  tokens: token-registry.yaml
  atoms: tasks/
  molecules: workflows/
  organisms: templates/
  templates: templates/
  instances: outputs/design-system/
settings:
  activation:
    show_context_report: true
    show_preload_report: true
    show_quick_commands: true
    quick_commands_limit: 6
  preload:
    max_token_files: 5
    max_blueprint_files: 3
independence: true
independence_details: |
  This squad is completely self-contained:
  - No database required
  - No external APIs
  - Works with any codebase (React, Vue, HTML/CSS)
  - All operations are filesystem-based
dependencies:
  optional:
    - name: Node.js
      version: '>=18.0'
      description: For component generation and npm packages
    - name: Tailwind CSS
      version: '>=4.0.0'
      description: CSS-first token system with @theme
    - name: shadcn/ui CLI
      version: latest
      description: Registry-first component distribution
metadata:
  # MIGRATION-SCHEMA-001 backfill
  name: design-system
  status: active
  domain: design-system
  version: 2.1.0
  score: 10
workspace_integration:
  level: controlled_runtime_consumer
  rationale: >-
    Design squad depende de contexto canônico de Design System por BU/app, mas não é owner da integração com workspace.
    O gate de readiness vem do COO e o squad só expande contexto local depois de receber liberação.
  read_paths:
    - workspace/_system/config.yaml
    - workspace/businesses/
    - workspace/businesses/{business}/L2-tactical/brand/brand-context.yaml
    - workspace/businesses/{business}/L2-tactical/design/social-visual-tokens.yaml
    - workspace/businesses/{business}/L2-tactical/design/marketing-ui-patterns.yaml
  write_paths: []
  readiness_owner: workspace-chief
  readiness_resolver: workspace/scripts/resolve-squad-workspace-readiness.cjs
tier_system:
  tier_0_foundation:
    description: Entry point agents for operations and adoption strategy
    agents: []
  tier_1_masters:
    description: Execution masters with specialist practices
    agents: []
  tier_2_specialists:
    description: Deep specialists for DS implementation
    agents: []
  orchestrator:
    description: Routes requests
    agent: design-chief
agents:
  - id: design-operator
    name: "Design Operator"
    role: "Human approval, cross-squad signoff and business context"
    tier: human
    executor_profile:
      story_role: "executor"
      can_execute: true
      sinkra_type: Human
      human_in_the_loop: true
      output_schema: design-approval-brief
  - id: design-runtime
    name: "Design Runtime"
    role: "Worker for deterministic validation, extraction and packaging"
    tier: worker
    executor_profile:
      story_role: "consultant"
      can_execute: false
      sinkra_type: Worker
      human_in_the_loop: true
      output_schema: design-runtime-report
  - id: design-chief
    name: "Design Chief"
    role: "Orchestrator and design-system lead"
    tier: 0
    executor_profile:
      story_role: "executor"
      can_execute: true
      sinkra_type: Agent
      human_in_the_loop: true
      output_schema: design-routing-decision
  - id: brad-frost
    name: "Brad Frost"
    role: "Design system architect and pattern consolidator"
    tier: 2
    executor_profile:
      story_role: "consultant"
      can_execute: false
      sinkra_type: Clone
      human_in_the_loop: true
      output_schema: ds-pattern-audit
  - id: dave-malouf
    name: "Dave Malouf"
    role: "DesignOps governance and scaling"
    tier: 1
    executor_profile:
      story_role: "consultant"
      can_execute: false
      sinkra_type: Clone
      human_in_the_loop: true
      output_schema: designops-assessment
  - id: dan-mall
    name: "Dan Mall"
    role: "Stakeholder buy-in and collaboration"
    tier: 1
    executor_profile:
      story_role: "consultant"
      can_execute: false
      sinkra_type: Clone
      human_in_the_loop: true
      output_schema: stakeholder-collage-report
  - id: nano-banana-generator
    name: "Nano Banana Generator"
    role: "Visual generation and exploration"
    tier: 2
    executor_profile:
      story_role: "consultant"
      can_execute: false
      sinkra_type: Clone
      human_in_the_loop: true
      output_schema: visual-generation-pack
  - id: ds-token-architect
    name: "DS Token Architect"
    role: "Token extraction and schema design"
    tier: 2
    ide_sync:
      enabled: false
      rationale: "Fonte atual não é parseável pelo runtime; manter fora da projeção até normalização"
    executor_profile:
      story_role: "consultant"
      can_execute: false
      sinkra_type: Clone
      human_in_the_loop: true
      output_schema: token-schema-package
  - id: ds-foundations-lead
    name: "DS Foundations Lead"
    role: "Foundations, primitives and system rules"
    tier: 2
    executor_profile:
      story_role: "consultant"
      can_execute: false
      sinkra_type: Clone
      human_in_the_loop: true
      output_schema: foundations-spec
  - id: storybook-expert
    name: "Storybook Expert"
    role: "Documentation and stories"
    tier: 2
    executor_profile:
      story_role: "consultant"
      can_execute: false
      sinkra_type: Clone
      human_in_the_loop: true
      output_schema: storybook-governance-report
  - id: page-composer
    name: "Page Composer"
    role: "Page choreography and layout composition"
    tier: 2
    executor_profile:
      story_role: "executor"
      can_execute: true
      sinkra_type: Clone
      human_in_the_loop: true
      output_schema: page-composition-report
