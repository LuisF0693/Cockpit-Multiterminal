epic_119_transition:
  acting_identity: design-ops-provider-core
  target_final_provider_shape:
    resident_agents:
      - design-chief
    legacy_brownfield_agents:
      - brad-frost
      - dave-malouf
      - dan-mall
      - nano-banana-generator
      - ds-token-architect
      - ds-foundations-lead
      - storybook-expert
    downstream_agent_targets:
      design_pages:
        - page-composer
      design_app: []
    open_gaps:
      - "Nao existe agent legacy claramente mapeado para a lane `design-app`."
  workflow_partition:
    provider_core:
      - agentic-readiness
      - audit-only
      - brownfield-complete
      - critical-eye
      - dtcg-tokens-governance
      - foundations-pipeline
      - motion-quality
      - ops-audit
      - storybook-brownfield-migration
      - storybook-full-setup
    consumer_residue:
      design_pages:
        - page-composition
      design_app:
        - self-healing-workflow
    transitional_generated:
      - epic-ds-alignment
      - greenfield-new
      - map-generated-quality-gates
      - map-generated-workflow-definition
  scope_boundaries:
    remains_in_core:
      - tokens
      - foundations
      - base-components
      - motion-primitives
      - storybook
      - docs
      - ai-readable-metadata
      - designops
      - quality-chain
      - release-contracts
      - starter-runtime-bootstrap
    leaves_core:
      design_pages:
        - page-composition
      design_app:
        - self-healing-workflow
